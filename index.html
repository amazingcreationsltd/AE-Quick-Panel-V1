<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE-Quick Panel V1</title>
<style>
/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Root tokens (from Figma) ── */
:root {
  --bg:        #232323;
  --surface:   #232323;
  --border-panel: rgba(255,255,255,0.85);
  --border-btn:   #B1B1B1;
  --text:      #B1B1B1;
  --icon:      #B1B1B1;
  --hover:     rgba(177,177,177,0.09);
  --active:    rgba(177,177,177,0.18);
  --radius-btn:    11px;
  --radius-grid:   10px;
  --radius-anchor: 9px;
}

/* ── Body / panel ── */
html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  overflow-y: auto;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  padding: 18px 16px 20px;
}

/* ── Section header ── */
.section-header {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 16px;
  color: var(--text);
  font-size: 13px;
  letter-spacing: 0.01em;
}

.section-header svg {
  flex-shrink: 0;
}

/* ── 2-column button grid ── */
.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

/* ── Tool buttons (Solid, Null, etc.) ── */
.tool-btn {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 0 14px;
  height: 58px;
  background: transparent;
  border: 1.5px solid var(--border-btn);
  border-radius: var(--radius-btn);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.1s ease, border-color 0.1s ease;
  white-space: nowrap;
  outline: none;
}

.tool-btn:hover  { background: var(--hover); }
.tool-btn:active,
.tool-btn.pressed { background: var(--active); }

.tool-btn svg { flex-shrink: 0; }

/* ── Divider ── */
.divider {
  height: 2px;
  background: var(--border-btn);
  border-radius: 1px;
  margin: 20px 0;
  opacity: 0.6;
}

/* ── Anchor grid outer container ── */
.anchor-container {
  border: 1.5px solid var(--border-btn);
  border-radius: var(--radius-grid);
  padding: 12px;
}

/* ── 3×3 anchor grid ── */
.anchor-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

/* ── Individual anchor buttons ── */
.anchor-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1;
  background: transparent;
  border: 1.5px solid var(--border-btn);
  border-radius: var(--anchor-radius, var(--radius-anchor));
  cursor: pointer;
  transition: background 0.1s ease;
  outline: none;
  padding: 0;
  min-height: 56px;
}

.anchor-btn:hover   { background: var(--hover); }
.anchor-btn:active,
.anchor-btn.pressed { background: var(--active); }

/* ── Toast feedback ── */
.toast {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(40,40,40,0.95);
  border: 1px solid var(--border-btn);
  color: var(--text);
  font-size: 11.5px;
  padding: 6px 14px;
  border-radius: 6px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
  z-index: 999;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.error { border-color: #e06060; color: #e06060; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(177,177,177,0.3); border-radius: 2px; }
</style>
